<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="100%" stop-color="#0b121d"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3c00"/>
      <stop offset="100%" stop-color="#ff7a2f"/>
    </linearGradient>
    <pattern id="grid3" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="627" fill="url(#bg3)"/>
  <rect width="1200" height="627" fill="url(#grid3)" opacity="0.9"/>

  <circle cx="980" cy="130" r="170" fill="rgba(255,60,0,0.08)"/>
  <circle cx="240" cy="520" r="150" fill="rgba(124,58,237,0.12)"/>

  <g>
    <rect x="120" y="90" width="520" height="48" rx="24" fill="rgba(255,255,255,0.08)"/>
    <rect x="132" y="102" width="180" height="24" rx="12" fill="url(#accent3)"/>
    <rect x="320" y="102" width="120" height="24" rx="12" fill="rgba(255,255,255,0.08)"/>
    <rect x="450" y="102" width="120" height="24" rx="12" fill="rgba(255,255,255,0.08)"/>
  </g>

  <g font-family="Arial, sans-serif" fill="#f5f5f0">
    <text x="120" y="210" font-size="52" font-weight="700">ERP Lite</text>
    <text x="120" y="252" font-size="20" fill="rgba(245,245,240,0.75)">
      Adapter contract + operational views
    </text>
    <text x="120" y="290" font-size="17" fill="rgba(245,245,240,0.55)">
      Floor, planner, and leadership lenses on the same ERP model.
    </text>
  </g>

  <g font-family="Courier New, monospace" font-size="14" fill="rgba(245,245,240,0.7)">
    <text x="120" y="340">• Contract v1 + diagnostics</text>
    <text x="120" y="365">• Stale detection + freshness badge</text>
    <text x="120" y="390">• Exception queue + risk scoring</text>
  </g>

  <!-- Three view cards -->
  <g>
    <rect x="700" y="220" width="360" height="110" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
    <text x="728" y="255" font-family="Courier New, monospace" font-size="13" fill="rgba(245,245,240,0.7)">
      FLOOR VIEW
    </text>
    <rect x="728" y="270" width="100" height="12" rx="6" fill="rgba(24,160,88,0.9)"/>
    <rect x="836" y="270" width="80" height="12" rx="6" fill="rgba(203,180,0,0.9)"/>
    <rect x="922" y="270" width="80" height="12" rx="6" fill="rgba(214,28,0,0.9)"/>
    <rect x="728" y="292" width="220" height="10" rx="5" fill="rgba(255,255,255,0.14)"/>
  </g>

  <g>
    <rect x="700" y="350" width="360" height="110" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
    <text x="728" y="385" font-family="Courier New, monospace" font-size="13" fill="rgba(245,245,240,0.7)">
      PLANNER VIEW
    </text>
    <rect x="728" y="400" width="260" height="10" rx="5" fill="rgba(255,255,255,0.14)"/>
    <rect x="728" y="416" width="210" height="10" rx="5" fill="rgba(255,255,255,0.14)"/>
    <rect x="728" y="432" width="180" height="10" rx="5" fill="rgba(255,255,255,0.14)"/>
  </g>

  <g>
    <rect x="700" y="480" width="360" height="110" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
    <text x="728" y="515" font-family="Courier New, monospace" font-size="13" fill="rgba(245,245,240,0.7)">
      LEADERSHIP VIEW
    </text>
    <rect x="728" y="530" width="80" height="22" rx="6" fill="rgba(255,255,255,0.12)"/>
    <rect x="816" y="530" width="80" height="22" rx="6" fill="rgba(255,255,255,0.12)"/>
    <rect x="904" y="530" width="80" height="22" rx="6" fill="rgba(255,255,255,0.12)"/>
  </g>

  <g>
    <rect x="80" y="520" width="420" height="40" rx="20" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <text x="110" y="546" font-family="Courier New, monospace" font-size="12" fill="rgba(245,245,240,0.65)">
      localhousedesigns.netlify.app/lab/erp-lite
    </text>
  </g>
</svg>
