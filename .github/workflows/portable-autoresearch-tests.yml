name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest tests\test_portable_autoresearch.py
      - name: Smoke CLI
        run: portable-autoresearch --repo-root . shell-health
