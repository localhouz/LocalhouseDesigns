name: Trusted Gate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "objective"
        type: choice
        options:
          - objective
          - suite
          - all
      objective:
        description: "Objective file or alias when mode=objective"
        required: false
        default: "smoke"
        type: string
      suite:
        description: "Suite file or alias when mode=suite"
        required: false
        default: "main"
        type: string

jobs:
  trusted-gate:
    runs-on: ubuntu-latest
    environment: trusted-gate
    env:
      AUTORESEARCH_GATE_SECRET: ${{ secrets.AUTORESEARCH_GATE_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Shell health
        run: portable-autoresearch --repo-root . shell-health
      - name: Run objective
        if: ${{ inputs.mode == 'objective' }}
        run: portable-autoresearch --repo-root . --config-root ./templates run-objective --objective "${{ inputs.objective }}"
      - name: Run suite
        if: ${{ inputs.mode == 'suite' }}
        run: portable-autoresearch --repo-root . --config-root ./templates run-suite --suite "${{ inputs.suite }}"
      - name: Run all suites
        if: ${{ inputs.mode == 'all' }}
        run: portable-autoresearch --repo-root . --config-root ./templates run-all-suites
      - name: Resolve latest run id
        id: latest
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, subprocess
          raw = subprocess.check_output(
              ["portable-autoresearch", "--repo-root", ".", "list-runs"],
              text=True,
          )
          payload = json.loads(raw)
          runs = list(payload.get("runs", []) or [])
          if not runs:
              raise SystemExit("No runs found after trusted gate execution")
          print(f"run_id={runs[0]['run_id']}")
          PY
      - name: Issue allow token
        run: portable-autoresearch --repo-root . issue-allow --run-id "${{ steps.latest.outputs.run_id }}"
      - name: Verify allow token
        run: portable-autoresearch --repo-root . verify-allow --run-id "${{ steps.latest.outputs.run_id }}"
      - name: Upload gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trusted-gate-${{ steps.latest.outputs.run_id }}
          path: .autoresearch
      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Trusted Gate"
            echo
            echo "- mode: \`${{ inputs.mode }}\`"
            echo "- run id: \`${{ steps.latest.outputs.run_id }}\`"
            echo "- allow token: issued and verified"
          } >> "$GITHUB_STEP_SUMMARY"
